<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC P2P Example - Latest Standard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 30px;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .video-section {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .video-label {
      font-weight: 600;
      color: #333;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    video {
      width: 100%;
      height: 300px;
      background: #000;
      border-radius: 8px;
      object-fit: cover;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    input[type="text"],
    input[type="button"] {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    input[type="text"] {
      background: white;
      color: #333;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input[type="button"] {
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    input[type="button"]:hover:not(:disabled) {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    input[type="button"]:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .message-section {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #messages {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      height: 200px;
      overflow-y: auto;
      background: #fafafa;
      font-size: 13px;
    }

    #messages p {
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .sent-message {
      color: #667eea;
      text-align: right;
    }

    .received-message {
      color: #666;
    }

    .message-input-group {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    #message-input {
      padding: 12px !important;
      border: 1px solid #ddd !important;
      border-radius: 6px !important;
      font-size: 14px !important;
    }

    .status {
      padding: 15px;
      border-radius: 6px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status.connected {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.connecting {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stats {
      font-size: 12px;
      color: #666;
      padding: 10px;
      background: #fafafa;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      max-height: 150px;
      overflow-y: auto;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      font-weight: 600;
      color: #333;
    }

    .stat-value {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎥 WebRTC P2P Example</h1>
      <p>Latest standard implementation - Direct peer-to-peer voice & video calling</p>
    </div>

    <div class="content">
      <!-- Video Section -->
      <div class="video-section">
        <div>
          <div class="video-label">📹 Your Video</div>
          <video id="local-video" playsinline autoplay muted></video>
        </div>

        <div>
          <div class="video-label">📹 Remote Video</div>
          <video id="remote-video" playsinline autoplay></video>
        </div>

        <div class="status disconnected">
          <span class="status-dot"></span>
          <span id="status-text">Not connected</span>
        </div>
      </div>

      <!-- Controls & Messages -->
      <div class="controls">
        <div class="form-group">
          <label for="call-server">Signaling Server URL</label>
          <input
            type="text"
            id="call-server"
            placeholder="wss://your-server.com/signal"
            value="wss://localhost:443"
          />
        </div>

        <div class="form-group">
          <label for="peer-id">Peer ID to Call</label>
          <input
            type="text"
            id="peer-id"
            placeholder="Enter peer ID or leave blank to wait"
          />
        </div>

        <div class="button-group">
          <input type="button" id="start-button" value="Start Call" onclick="startCall()" />
          <input type="button" id="end-button" value="End Call" onclick="endCall()" disabled />
        </div>

        <!-- Messaging Section -->
        <div class="message-section">
          <label>Messages</label>
          <div id="messages"></div>

          <div class="message-input-group">
            <input
              type="text"
              id="message-input"
              placeholder="Type a message..."
              onkeypress="if(event.key === 'Enter') sendMessage()"
            />
            <input
              type="button"
              id="send-button"
              value="Send"
              onclick="sendMessage()"
              disabled
            />
          </div>
        </div>

        <!-- Statistics -->
        <div>
          <label style="display: block; margin-bottom: 10px;">Connection Stats</label>
          <div class="stats">
            <div class="stat-row">
              <span class="stat-label">Status:</span>
              <span class="stat-value" id="stat-connection">Disconnected</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">RTT:</span>
              <span class="stat-value" id="stat-rtt">--</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Bandwidth:</span>
              <span class="stat-value" id="stat-bandwidth">--</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Packet Loss:</span>
              <span class="stat-value" id="stat-loss">--</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Video FPS:</span>
              <span class="stat-value" id="stat-fps">--</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Load WebRTC Client -->
  <script src="webrtc_p2p_client.js"></script>

  <script>
    // === UI Event Handlers ===

    function startCall() {
      const serverId = document.getElementById('call-server').value;
      if (!serverId.trim()) {
        alert('Please enter a signaling server URL');
        return;
      }

      setupSignaling(serverId);
      initializePeerConnection()
        .then(() => {
          const peerId = document.getElementById('peer-id').value;
          return startCall(peerId);
        })
        .then(() => {
          document.getElementById('start-button').disabled = true;
          document.getElementById('end-button').disabled = false;
          startStatsMonitoring();
        })
        .catch(error => {
          alert('Error starting call: ' + error.message);
        });
    }

    function endCall() {
      endCall();
      document.getElementById('start-button').disabled = false;
      document.getElementById('end-button').disabled = true;
      document.getElementById('message-input').disabled = true;
      document.getElementById('send-button').disabled = true;
      updateStatus('disconnected', 'Not connected');
    }

    function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (text) {
        sendMessage(text);
        input.value = '';
      }
    }

    // === Event Listeners ===

    on('signaling-connected', () => {
      updateStatus('connecting', 'Signaling connected, waiting for peer...');
    });

    on('call-initiated', () => {
      updateStatus('connecting', 'Call initiated, waiting for answer...');
    });

    on('connection-state', (data) => {
      if (data.state === 'connected') {
        updateStatus('connected', 'Connected');
      } else if (data.state === 'failed') {
        updateStatus('disconnected', 'Connection failed');
      }
    });

    on('ice-connection-state', (data) => {
      console.log('ICE state:', data.state);
    });

    on('media:ready', () => {
      console.log('Media streams ready');
    });

    on('data-channel-open', () => {
      console.log('Data channel opened');
      document.getElementById('message-input').disabled = false;
      document.getElementById('send-button').disabled = false;
    });

    on('data-channel-close', () => {
      console.log('Data channel closed');
      document.getElementById('message-input').disabled = true;
      document.getElementById('send-button').disabled = true;
    });

    on('stats-updated', (stats) => {
      // Update RTT
      if (stats.connection.currentRoundTripTime) {
        const rtt = (stats.connection.currentRoundTripTime * 1000).toFixed(0);
        document.getElementById('stat-rtt').textContent = `${rtt}ms`;
      }

      // Update bandwidth
      if (stats.connection.availableOutgoingBitrate) {
        const bw = (stats.connection.availableOutgoingBitrate / 1000).toFixed(0);
        document.getElementById('stat-bandwidth').textContent = `${bw}kbps`;
      }

      // Update packet loss
      if (stats.video.inbound.packetsReceived) {
        const loss = stats.video.inbound.packetsLost || 0;
        const received = stats.video.inbound.packetsReceived || 1;
        const lossPercent = ((loss / (loss + received)) * 100).toFixed(1);
        document.getElementById('stat-loss').textContent = `${lossPercent}%`;
      }

      // Update FPS
      if (stats.video.inbound.framesPerSecond) {
        const fps = stats.video.inbound.framesPerSecond.toFixed(0);
        document.getElementById('stat-fps').textContent = `${fps}fps`;
      }
    });

    on('error', (error) => {
      console.error('Error:', error);
      alert(`Error (${error.type}): ${error.error.message}`);
    });

    // === Helper Functions ===

    function updateStatus(state, text) {
      const statusEl = document.querySelector('.status');
      statusEl.className = `status ${state}`;
      document.getElementById('status-text').textContent = text;
      document.getElementById('stat-connection').textContent = text;
    }

    // Initialize
    console.log('WebRTC P2P Example loaded');
  </script>
</body>
</html>
